name: 🚀 Production-Grade CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: myapp
  EKS_CLUSTER: cloud-native-cluster

jobs:
  # ========== STAGE 1: LINT & TEST ==========
  lint:
    name: 🔍 Lint & Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install flake8
        run: pip install flake8
      - name: Run linting
        run: flake8 . --count --max-complexity=10 --statistics

  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run tests
        run: |
          pytest || echo "No tests found - skipping"

  # ========== STAGE 2: SECURITY SCAN (Parallel) ==========
  security-sast:
    name: 🔒 SAST Scan (CodeQL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  security-trivy:
    name: 🐳 Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t myapp:test .
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: myapp:test
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  security-secrets:
    name: 🕵️ Secrets Detection (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: ${{ github.sha }}

  # ========== STAGE 3: BUILD & PUSH ==========
  build:
    name: 📦 Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [test, security-sast, security-trivy, security-secrets]
    outputs:
      image_tag: ${{ steps.image-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Generate image tag
        id: image-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.environment }}-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          else
            echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          fi
      
      - name: Build Docker image
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.image-tag.outputs.tag }} .
          docker tag ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.image-tag.outputs.tag }} ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
      
      - name: Push to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.image-tag.outputs.tag }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

  # ========== STAGE 4: DEPLOY TO STAGING ==========
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'staging'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}
      
      - name: Deploy to EKS
        run: |
          kubectl set image deployment/myapp myapp=${{ needs.build.outputs.image_tag }} --record
          kubectl rollout status deployment/myapp --timeout=5m
      
      - name: Get Service URL
        run: kubectl get svc myapp

  # ========== STAGE 5: SMOKE TEST ==========
  smoke-test:
    name: 🔥 Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Get Service URL
        run: |
          EXTERNAL_IP=$(kubectl get svc myapp -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "EXTERNAL_IP=$EXTERNAL_IP" >> $GITHUB_ENV
      - name: Test endpoint
        run: |
          curl --retry 5 --retry-delay 10 --fail http://${{ env.EXTERNAL_IP }}
          echo "✅ Smoke test passed"

  # ========== STAGE 6: MANUAL APPROVAL (Production) ==========
  approval-production:
    name: ⏸️ Approval Required
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.event.inputs.environment == 'production'
    environment: production
    steps:
      - name: Wait for manual approval
        run: echo "⏳ Waiting for approval to deploy to production"

  # ========== STAGE 7: DEPLOY TO PRODUCTION ==========
  deploy-production:
    name: 🌍 Deploy to Production
    runs-on: ubuntu-latest
    needs: approval-production
    if: needs.approval-production.result == 'success'
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}
      
      - name: Deploy to Production
        run: |
          kubectl set image deployment/myapp myapp=${{ needs.build.outputs.image_tag }}
          kubectl rollout status deployment/myapp --timeout=5m

  # ========== STAGE 8: ROLLBACK ON FAILURE ==========
  rollback:
    name: 🔄 Rollback
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: failure()
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Rollback deployment
        run: |
          kubectl rollout undo deployment/myapp
          echo "⚠️ Deployment failed - rolled back to previous version"

  # ========== STAGE 9: SLACK NOTIFICATION ==========
  slack-notify:
    name: 📢 Slack Notification
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production, rollback]
    if: always()
    steps:
      - name: Send notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🎯 *Deployment Report*\nEnvironment: ${{ github.event.inputs.environment || github.ref_name }}\nStatus: ${{ job.status }}\nCommit: ${{ github.sha }}\nRepo: ${{ github.repository }}\nBy: ${{ github.actor }}\nImage: ${{ needs.build.outputs.image_tag }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ========== STAGE 10: PERFORMANCE TEST ==========
  performance-test:
    name: ⚡ Performance Test
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Get Service URL
        run: |
          EXTERNAL_IP=$(kubectl get svc myapp -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "EXTERNAL_IP=$EXTERNAL_IP" >> $GITHUB_ENV
      - name: Run k6 load test
        uses: grafana/k6-action@v0.3.0
        with:
          filename: |
            import http from 'k6/http';
            import { sleep, check } from 'k6';
            export let options = {
              vus: 10,
              duration: '30s',
            };
            export default function () {
              let res = http.get('http://${{ env.EXTERNAL_IP }}');
              check(res, { 'status is 200': (r) => r.status === 200 });
              sleep(1);
            }
